<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Clothing Origin Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Headr -->
  <header class="top-bar">
    <div class="logo">AI Clothing Origin Finder</div>
    <div>
      <button class="contrast-toggle" onclick="toggleContrast()" title="Toggle high contrast mode">🔆 Contrast</button>
      <button class="login-btn" onclick="openLogin()">Login</button>
    </div>
  </header>

  
  <div class="container">
    <h1>AI Clothing Origin Finder</h1>
    <p>Upload an image and let AI find similar clothing online.</p>

    <div id="userInfo"></div>

    <input type="file" id="imageInput" accept="image/*" />
    <button onclick="uploadImage()">Upload & Analyse</button>

    <div id="status"></div>
    <div id="results"></div>
  </div>

  
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeLogin()">&times;</span>

      <h2>Welcome back</h2>
      <p class="subtext">Login is optional — you can continue as a guest.</p>

      <input id="emailInput" type="email" placeholder="Email" />
      <input id="passwordInput" type="password" placeholder="Password (8+ chars)" />

      <button id="modalLoginBtn" class="modal-login-btn" disabled onclick="handleModalLogin()">
        Login
      </button>
    </div>
  </div>

 
  <script src="script.js"></script>
</body>
</html>
